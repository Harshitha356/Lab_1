<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Counter</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Times New Roman', Times, serif;
      background: #f5f5f5;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .counter-card {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .counter-title {
      font-size: 30px;
      margin-bottom: 15px;
      color: #2c3e50;
    }

    .counter-value {
      font-size: 48px;
      font-weight: bold;
      margin: 15px 0 25px 0;
      color: #34495e;
    }

    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .buttons button {
      padding: 8px 18px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background-color: #9ab929;
      color: white;
      min-width: 60px;
    }

    .buttons button:hover {
      background-color: #9ab929;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Exercise_3.js"></script>
</body>
</html>
