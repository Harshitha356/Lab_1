<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Cards - React App</title>

  <!-- React and ReactDOM from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Times New Roman', Times, serif; margin: 0; padding: 20px; background: #f5f5f5; }
    h1 { text-align: center; color: green; }

    .cards-container {
      max-width: 900px;
      margin: 20px auto;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .student-card {
      width: 260px;
      background: #ffffff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .student-name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #34495e;
    }

    .label {
      font-weight: bold;
      font-size: 18px;
      color: #555;
      min-width: 100px;
      display: inline-block;
    }

    .value {
      color: blueviolet;
      font-size:18px;
    }

    .detail-row {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Your React code for Exercise 2 -->
  <script type="text/babel" src="Exercise_2.js"></script>
</body>
</html>
