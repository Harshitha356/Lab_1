<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Item List</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Times New Roman', Times, serif; margin: 20px; }
    .container { max-width: 400px; margin: 0 auto; }
    .controls { margin-bottom: 12px; }
    .controls input { width: 70%; padding: 6px; box-sizing: border-box; }
    .controls button { padding: 7px 10px; margin-left: 6px; }
    ul { padding-left: 18px; }
    li { margin-bottom: 6px; }
    li button { margin-left: 8px; }
    .empty-text { font-style: italic; color: greenyellow; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Exercise_2.js"></script>
