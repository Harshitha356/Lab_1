<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React User Form</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Times New Roman', Times, serif;
      margin: 20px;
    }

    .form-wrapper {
      max-width: 400px;
      margin: 0 auto;
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 4px;
    }

    .form-wrapper h2 {
      text-align: center;
      margin-top: 0;
      color:blueviolet;
    }

    .field-row {
      margin-bottom: 10px;
    }

    .field-row label {
      display: block;
      margin-bottom: 3px;
    }

    .field-row input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
      font-size: 12px;
    }

    .error-text {
      color: red;
      font-size: 12px;
    }

    .success-text {
      color: green;
      font-size: 13px;
      text-align: center;
      margin-bottom: 8px;
    }

    button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Exercise_1.js"></script>
</body>
</html>
