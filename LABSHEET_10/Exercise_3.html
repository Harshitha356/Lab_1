<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React API Fetch</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color:lavender;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    background: #ffffff;
    padding: 16px 20px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  h2 {
    color: #2c3e50;
    margin-top: 0;
  }

  .post {
    margin-bottom: 10px;
    padding: 8px;
    border-radius: 4px;
    background: #eaf2ff;          
    border: 1px solid #c3d4ff;
  }

  .title {
    font-weight: bold;
    margin-bottom: 4px;
    color: #1f3b73;              
  }

  .loading {
    color: #2980b9;               
    font-weight: bold;
  }

  .error {
    color: #c0392b;               
    font-weight: bold;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Exercise_3.js"></script>
</body>
</html>
