<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
            text-align: center;
        }
        input {
            padding: 10px;
            margin: 10px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 5px;
            min-height: 60px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>Course Enrollment</h2>
    <input id="course" placeholder="Course Name">
    <input id="instructor" placeholder="Instructor">
    <input id="seats" type="number" placeholder="Seats">
    <br><button onclick="enroll()">Enroll</button>
    <div id="result"></div>

    <script>
        class Course {
            constructor(name, instructor) {
                this.name = name;
                this.instructor = instructor;
            }
            display() {
                return `Course: ${this.name}, Instructor: ${this.instructor}`;
            }
        }

        function enroll() {
            let name = document.getElementById("course").value || "Web Tech";
            let instructor = document.getElementById("instructor").value || "Dr. Kumar";
            let seats = Number(document.getElementById("seats").value) || 0;
            
            let course = new Course(name, instructor);
            let result = document.getElementById("result");
            
            let promise = new Promise((resolve, reject) => {
                if (seats > 0) resolve("Enrollment Successful");
                else reject("Course Full");
            });
            
            promise.then(msg => {
                result.innerHTML = course.display() + "<br>" + msg;
                result.className = "success";
            }).catch(err => {
                result.innerHTML = err;
                result.className = "error";
            });
        }
    </script>
</body>
</html>
